<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Great Work — Audio Visualizer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='none' stroke='%23c0432a' stroke-width='2.5'/><circle cx='16' cy='16' r='3' fill='%23c0432a'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=JetBrains+Mono:wght@400;500&family=VT323&family=Pirata+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0906;
    --ink:#050403;
    --red:#c0432a;
    --copper:#b5651d;
    --ember:#c0432a;
    --parchment:#e8e2d0;
    --violet:#1a0f2e;
    --line: rgba(201, 39, 39, 0.35);
    --panel-bg: rgba(8,7,5,0.72);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--ink);
    font-family:'Pirata One', serif;
    color:var(--parchment);
  }
  canvas{
    position:fixed; inset:0; display:block; width:100%; height:100%;
    background:var(--bg-void);
  }
  .mono{ font-family:'JetBrains Mono', monospace; letter-spacing:0.03em; }

  /* ---------- 80s CRT / terminal skin ---------- */
  #crtOverlay{
    position:fixed; inset:0; z-index:3; pointer-events:none; mix-blend-mode:screen;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.05) 0px,
        rgba(255,255,255,0.05) 1px,
        transparent 1px,
        transparent 3px
      );
    animation: flicker 6.2s infinite;
  }
  #crtVignette{
    position:fixed; inset:0; z-index:3; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  #crtSync{
    position:fixed; left:0; right:0; height:60px; z-index:3; pointer-events:none;
    background:linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
    animation: sync 9s linear infinite;
  }
  @keyframes flicker{
    0%,100%{ opacity:0.9; } 42%{ opacity:0.9; } 43%{ opacity:0.6; } 44%{ opacity:0.9; }
    71%{ opacity:0.9; } 72%{ opacity:0.7; } 73%{ opacity:0.9; }
  }
  @keyframes sync{
    0%{ top:-60px; } 100%{ top:100vh; }
  }
  body.no-scanlines #crtOverlay{ display:none; }
  body.no-vignette #crtVignette{ display:none; }
  body.no-sync #crtSync{ display:none; }

  .fx-toggle-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .fx-toggle-grid .sigil-btn{ font-size:14px; padding:8px 6px; text-align:center; }

  #veil{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:18px; text-align:center; padding:24px;
    background: radial-gradient(ellipse at center, rgba(26,15,46,0.55) 0%, rgba(5,4,3,0.92) 70%);
    z-index:5; transition:opacity .8s ease;
  }
  #veil h1{
    font-family:'Pirata One', monospace,; font-weight:400; font-size:clamp(32px,5vw,52px); margin:0;
    color:var(--red); letter-spacing:0.08em;
    text-shadow:0 0 24px rgba(201, 39, 39, 0.5), 0 0 2px rgba(201, 39, 39, 0.8);
  }
  #veil p{ margin:0; opacity:.75; font-size:16px; max-width:440px; line-height:1.5;}
  #veil.hidden{ opacity:0; pointer-events:none; }

  .sigil-btn{
    appearance:none; border:1px solid var(--line); background:rgba(201,162,39,0.06);
    color:var(--parchment); padding:10px 20px; border-radius:2px; cursor:pointer;
    font-family:'VT323', serif; font-size:16px; letter-spacing:0.05em;
    transition:all .25s ease; white-space:nowrap;
  }
  .sigil-btn:hover{ background:rgba(201,162,39,0.16); border-color:var(--red); }
  .sigil-btn:disabled{ opacity:.35; cursor:not-allowed; }
  .sigil-btn.active{ background:var(--red); color:var(--ink); border-color:var(--red); font-weight:600;}
  .sigil-btn.record{ border-color:rgba(192,67,42,0.5); }
  .sigil-btn.record.on{ background:var(--ember); color:var(--parchment); border-color:var(--ember);
    animation:pulse-rec 1.4s infinite;}
  @keyframes pulse-rec{ 0%,100%{box-shadow:0 0 0 0 rgba(192,67,42,0.55);} 50%{box-shadow:0 0 0 8px rgba(192,67,42,0);} }

  #micBtn.on{ background:var(--ember); color:var(--parchment); border-color:var(--ember); }
  #liveStatus.on::before{ content:'● '; color:var(--ember); animation:blink 1.2s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

  input[type=file]{ display:none; }

  #panel{
    position:fixed; top:20px; left:20px; z-index:4;
    background:var(--panel-bg); border:2px solid var(--red); border-radius:0;
    box-shadow:0 0 0 1px var(--ink), 0 0 18px rgba(201, 39, 39, 0.25) inset;
    backdrop-filter: blur(6px); padding:16px 18px; width:340px;
    transition:transform .35s ease, opacity .35s ease;
    font-family:'VT323', monospace;
    max-height:90vh; overflow-y:auto;
  }
  #panel.collapsed{ transform:translateX(-110%); opacity:0; pointer-events:none; }
  #panel::-webkit-scrollbar{ width:6px; }
  #panel::-webkit-scrollbar-thumb{ background:var(--line); }

  #panel h2{ margin:0 0 12px; font-size:25px; letter-spacing:0.14em; text-transform:uppercase; text-align: center;
    color:var(--red); font-weight:400; font-family:'VT323',monospace;}
  #panel h2::before{ content:'🜂🜃 '; }
  #panel h2::after{ content:' 🜁🜄'; }

  #panel label, #panel select, #panel .row span{ font-family:'VT323', monospace; font-size:17px; }

  select, .text-input{
    width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--line); color:var(--parchment);
    padding:6px 8px; font-family:'VT323',monospace; font-size:16px; margin-bottom:10px;
  }
  .color-row{ display:flex; gap:10px; align-items:center; margin-bottom:10px; }
  .color-row label{ flex:1; font-size:14px; opacity:.8; font-family:'JetBrains Mono',monospace; letter-spacing:0; }
  input[type=color]{
    width:34px; height:26px; border:1px solid var(--line); background:none; padding:0; cursor:pointer;
  }
  fieldset{ border:1px solid var(--line); margin:0 0 12px; padding:10px; }
  fieldset legend{ font-family:'VT323',monospace; font-size:15px; color:var(--red); padding:0 6px; letter-spacing:0.08em; text-transform:uppercase; }

  .row{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .row.tight .sigil-btn{ flex:1; padding:8px 6px; font-size:14px; text-align:center;}

  #dropLabel{
    display:block; width:100%; text-align:center; padding:14px; margin-bottom:12px;
    border:1px dashed var(--line); border-radius:2px; cursor:pointer; font-size:15px;
    transition:all .2s ease;
  }
  #dropLabel:hover{ border-color:var(--red); background:rgba(201,162,39,0.06); }

  #trackName{ font-size:13px; opacity:.65; margin:0 0 12px; word-break:break-all; min-height:16px;}

  .slider-row{ margin-bottom:10px; }
  .slider-row label{ display:flex; justify-content:space-between; font-size:13px; opacity:.75; margin-bottom:4px; }
  input[type=range]{
    width:100%; -webkit-appearance:none; height:2px; background:var(--line); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
    background:var(--red); cursor:pointer; border:1px solid var(--ink);
  }

  #readout{
    display:flex; justify-content:space-between; font-size:12px; opacity:.7; margin-top:6px;
    padding-top:10px; border-top:1px solid var(--line);
  }

  #toggle{
    position:fixed; top:20px; left:20px; z-index:6; width:38px; height:38px;
    border:1px solid var(--line); background:var(--panel-bg); color:var(--red);
    border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); transition:transform .2s ease;
  }
  #toggle:hover{ transform:scale(1.08); }

  a#dl{ display:none; }

  ::selection{ background:var(--red); color:var(--ink); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="crtOverlay"></div>
<div id="crtVignette"></div>
<div id="crtSync"></div>

<div id="veil">
  <h1>The Great Work</h1>
  <p>Load a track. The seal will draw itself from its frequencies — moving through the steps of the alchemical process as the work unfolds.</p>
  <label id="dropLabel2" class="sigil-btn" for="fileInput" style="padding:14px 28px; font-size:18px;">Choose a track</label>
  <button id="veilLiveBtn" class="sigil-btn" style="padding:14px 28px; font-size:18px; border-color:var(--ember);">Go Live (microphone)</button>
</div>

<button id="toggle" title="Show / hide panel">☽</button>

<script>
  const toggleBtn = document.getElementById('toggle');

  toggleBtn.addEventListener('click', () => {
    // Check the current icon and swap it
    if (toggleBtn.textContent === '☽') {
      toggleBtn.textContent = '☉'; 
      toggleBtn.title = "Hide panel"; // Optional: Update title for better accessibility
    } else {
      toggleBtn.textContent = '☽';
      toggleBtn.title = "Show panel";
    }
  });
</script>

<div id="panel" class="collapsed">
  <h2>Instrument</h2>

  <fieldset>
    <legend>Input Source</legend>
    <div class="row tight" style="margin-bottom:10px;">
      <button class="sigil-btn input-mode-btn active" data-mode="file">FILE</button>
      <button class="sigil-btn input-mode-btn" data-mode="live">LIVE</button>
    </div>

    <div id="fileControls">
      <label id="dropLabel" for="fileInput">Draw from a sound file</label>
      <input type="file" id="fileInput" accept="audio/*">
      <p id="trackName" class="mono"></p>
      <div class="row tight">
        <button class="sigil-btn" id="playBtn" disabled>PLAY</button>
        <button class="sigil-btn" id="stopBtn" disabled>STOP</button>
      </div>
    </div>

    <div id="liveControls" style="display:none;">
      <select id="micSelect" style="display:none;"></select>
      <button class="sigil-btn" id="micBtn" style="width:100%;">Enable Microphone</button>
      <p id="liveStatus" class="mono" style="font-size:13px; opacity:.7; margin:8px 0 0;">Not listening</p>
    </div>
  </fieldset>

  <div class="row tight">
    <button class="sigil-btn record" id="recBtn" disabled>RECORD</button>
  </div>

  <div class="slider-row">
    <label><span>Sensitivity</span><span id="sensVal" class="mono">1.0</span></label>
    <input type="range" id="sensSlider" min="0.4" max="2.2" step="0.05" value="1.0">
  </div>

  <fieldset>
    <legend>Glyph Ring</legend>
    <select id="glyphSetSelect">
      <option value="planetary">Planetary (7)</option>
      <option value="zodiac">Zodiac (12)</option>
      <option value="alchemical">Alchemical (7)</option>
      <option value="elemental">Elemental (4)</option>
      <option value="tarot">Tarot (22)</option>
      <option value="runic">Elder Futhark (12)</option>
      <option value="custom">Custom…</option>
    </select>
    <input type="text" id="customGlyphs" class="text-input" placeholder="type symbols, comma separated: ☉,☽,☿"
      style="display:none;">
  </fieldset>

  <fieldset>
    <legend>Central Sigil</legend>
    <div class="slider-row" style="margin-bottom:0;">
      <label><span>Points</span><span id="sigilPtsVal" class="mono">7</span></label>
      <input type="range" id="sigilPtsSlider" min="3" max="12" step="1" value="7">
    </div>
    <div class="row tight" style="margin-top:10px;">
      <button class="sigil-btn fx-btn" id="fxOscilloscope">Oscilloscope</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Particles</legend>
    <div class="row tight">
      <button class="sigil-btn fx-btn" id="fxStarfield">Starfield Mode</button>
      <button class="sigil-btn fx-btn" id="fxParticleShape">Triangles</button>
    </div>
    <div class="slider-row">
      <label><span>Particles Size</span><span id="particlesSizeVal" class="mono">2</span></label>
      <input type="range" id="particlesSizeSlider" min="1" max="10" step="1" value="2">
    </div>
  </fieldset>

  <fieldset>
    <legend>Display FX</legend>
    <div class="fx-toggle-grid">
      <button class="sigil-btn fx-btn active" id="fxScanlines" data-fx="scanlines">Scanlines</button>
      <button class="sigil-btn fx-btn active" id="fxVignette" data-fx="vignette">Vignette</button>
      <button class="sigil-btn fx-btn active" id="fxSync" data-fx="sync">Sync Roll</button>
      <button class="sigil-btn fx-btn active" id="fxPixelate" data-fx="pixelate">Pixelate</button>
    </div>
    <div class="slider-row" id="pixelSizeRow">
      <label><span>Pixel Size</span><span id="pixelSizeVal" class="mono">4</span></label>
      <input type="range" id="pixelSizeSlider" min="2" max="16" step="1" value="4">
    </div>
  </fieldset>

  <fieldset>
    <legend>Palette</legend>
    <div class="color-row">
      <label>Void / bg</label><input type="color" id="colorBg" value="#0a0906">
      <label>Primary</label><input type="color" id="colorA" value="#c9a227">
      <label>Accent</label><input type="color" id="colorB" value="#c9a227">
    </div>
    <div class="row tight" style="margin-bottom:10px;">
      <button class="sigil-btn stage-set-btn active" data-set="greatWork">Great Work</button>
      <button class="sigil-btn stage-set-btn" data-set="energy">Energy</button>
    </div>
  </fieldset>

  <div class="row tight" style="margin-top:2px;">
    <button class="sigil-btn stage-btn active" data-stage="auto">Auto</button>
    <button class="sigil-btn stage-btn" data-stage="custom">Custom</button>
  </div>
  <div id="stageIndividualButtons" class="row tight"></div>

  <div id="readout" class="mono">
    <span id="stageLabel">—</span>
    <span id="timeLabel">00:00 / 00:00</span>
  </div>
</div>

<a id="dl"></a>

<audio id="audioEl" crossorigin="anonymous" style="display:none;"></audio>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const audioEl = document.getElementById('audioEl');
  const fileInput = document.getElementById('fileInput');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  const recBtn = document.getElementById('recBtn');
  const trackName = document.getElementById('trackName');
  const veil = document.getElementById('veil');
  const panel = document.getElementById('panel');
  const toggleBtn = document.getElementById('toggle');
  const sensSlider = document.getElementById('sensSlider');
  const particlesSizeSlider = document.getElementById('particlesSizeSlider');
  let particleSizeMultiplier = parseFloat(particlesSizeSlider.value);
  const particlesSizeVal = document.getElementById('particlesSizeVal');
  const sensVal = document.getElementById('sensVal');
  const stageLabel = document.getElementById('stageLabel');
  const timeLabel = document.getElementById('timeLabel');
  const stageButtons = [...document.querySelectorAll('.stage-btn')];
  const dl = document.getElementById('dl');
  const inputModeButtons = [...document.querySelectorAll('.input-mode-btn')];
  const fileControls = document.getElementById('fileControls');
  const liveControls = document.getElementById('liveControls');
  const micBtn = document.getElementById('micBtn');
  const micSelect = document.getElementById('micSelect');
  const liveStatus = document.getElementById('liveStatus');

  let dpr = Math.max(1, window.devicePixelRatio || 1);

  // Pixelate FX buffer — declared here (before resize) so resize() can
  // keep it matched to the main canvas's actual pixel dimensions.
  let pixelateOn = true;
  let pixelSize = 4;
  const pixelCanvas = document.createElement('canvas');
  const pixelCtx = pixelCanvas.getContext('2d');
  pixelCtx.imageSmoothingEnabled = false;
  function updatePixelCanvasSize(){
    pixelCanvas.width = Math.max(1, Math.floor(canvas.width / pixelSize));
    pixelCanvas.height = Math.max(1, Math.floor(canvas.height / pixelSize));
  }

  function resize(){
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    updatePixelCanvasSize();
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Audio graph ----------
  // Design note: analyser and recDest are permanent and shared. Whichever
  // source is "active" (file element or microphone) connects INTO the
  // analyser. Only the file source also connects to speakers — the mic
  // deliberately does NOT, to avoid feedback squeal on a live rig.
  let audioCtx, analyser, sourceNode, recDest, freqData, timeData, bandCount;
  let micStream = null, micSourceNode = null;
  let activeSourceNode = null;
  let inputMode = 'file'; // 'file' | 'live'
  let liveStartTime = 0;
  let sensitivity = 1.0;
  sensSlider.addEventListener('input', () => {
    sensitivity = parseFloat(sensSlider.value);
    sensVal.textContent = sensitivity.toFixed(2);
  });

  function initAudio(){
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.78;
    bandCount = analyser.frequencyBinCount;
    freqData = new Uint8Array(bandCount);
    timeData = new Uint8Array(analyser.fftSize);
    recDest = audioCtx.createMediaStreamDestination();
    analyser.connect(recDest);

    sourceNode = audioCtx.createMediaElementSource(audioEl);
  }

  function disconnectActiveSource(){
    if (activeSourceNode){
      try{ activeSourceNode.disconnect(); }catch(e){}
    }
    activeSourceNode = null;
  }

  function connectFileSource(){
    disconnectActiveSource();
    sourceNode.connect(analyser);
    sourceNode.connect(audioCtx.destination);
    activeSourceNode = sourceNode;
  }

  async function connectLiveSource(deviceId){
    const constraints = {
      audio: {
        echoCancellation:false, noiseSuppression:false, autoGainControl:false,
        ...(deviceId ? { deviceId:{ exact: deviceId } } : {}),
      }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    // stop any prior mic stream before adopting the new one
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    micStream = stream;
    disconnectActiveSource();
    micSourceNode = audioCtx.createMediaStreamSource(stream);
    micSourceNode.connect(analyser); // deliberately NOT connected to destination
    activeSourceNode = micSourceNode;
  }

  function stopLiveSource(){
    if (micStream){ micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (micSourceNode){ try{ micSourceNode.disconnect(); }catch(e){} micSourceNode = null; }
    if (activeSourceNode === null) return;
    activeSourceNode = null;
  }

  async function populateMicList(){
    try{
      const devices = await navigator.mediaDevices.enumerateDevices();
      const inputs = devices.filter(d => d.kind === 'audioinput');
      micSelect.innerHTML = '';
      inputs.forEach((d,i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Input ${i+1}`;
        micSelect.appendChild(opt);
      });
      micSelect.style.display = inputs.length > 1 ? 'block' : 'none';
    } catch(e){ /* labels unavailable until permission granted; harmless */ }
  }

document.addEventListener('keydown', (e) => {
  const typing = e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT';
  if (typing) return; // don't hijack Space/R while someone's typing custom glyphs, etc.

  if (e.code === 'Space'){
    e.preventDefault();          // stops the page itself from scrolling on spacebar
    if (!playBtn.disabled) playBtn.click();
  }
  if (e.key.toLowerCase() === 'r'){
    if (!recBtn.disabled) recBtn.click();
  }
});

  // ---------- Input mode toggle ----------
  inputModeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      inputModeButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const mode = btn.dataset.mode;
      inputMode = mode;
      if (mode === 'file'){
        liveControls.style.display = 'none';
        fileControls.style.display = 'block';
        stopLiveSource();
        micBtn.textContent = 'Enable Microphone';
        micBtn.classList.remove('on');
        liveStatus.textContent = 'Not listening';
        liveStatus.classList.remove('on');
        if (audioCtx && audioEl.src){ initAudio(); connectFileSource(); recBtn.disabled = false; }
        else { recBtn.disabled = true; }
      } else {
        fileControls.style.display = 'none';
        liveControls.style.display = 'block';
        if (playing){ audioEl.pause(); playBtn.textContent = 'PLAY'; playing = false; }
        recBtn.disabled = !micStream;
      }
    });
  });

  micBtn.addEventListener('click', async () => {
    initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (!micStream){
      try{
        liveStatus.textContent = 'Requesting microphone…';
        await connectLiveSource(micSelect.value || undefined);
        await populateMicList();
        micBtn.textContent = 'Disable Microphone';
        micBtn.classList.add('on');
        liveStatus.textContent = 'Listening';
        liveStatus.classList.add('on');
        liveStartTime = performance.now();
        recBtn.disabled = false;
        veil.classList.add('hidden');
        panel.classList.remove('collapsed');
      } catch(err){
        liveStatus.textContent = 'Microphone access denied or unavailable';
        liveStatus.classList.remove('on');
      }
    } else {
      stopLiveSource();
      micBtn.textContent = 'Enable Microphone';
      micBtn.classList.remove('on');
      liveStatus.textContent = 'Not listening';
      liveStatus.classList.remove('on');
      recBtn.disabled = true;
    }
  });

  particlesSizeSlider.addEventListener('input', () => {
    particleSizeMultiplier = parseFloat(particlesSizeSlider.value);
    particlesSizeVal.textContent = particleSizeMultiplier;
});

  // ---------- Display FX toggles ----------
  document.getElementById('fxScanlines').addEventListener('click', function(){
    document.body.classList.toggle('no-scanlines');
    this.classList.toggle('active', !document.body.classList.contains('no-scanlines'));
  });
  document.getElementById('fxVignette').addEventListener('click', function(){
    document.body.classList.toggle('no-vignette');
    this.classList.toggle('active', !document.body.classList.contains('no-vignette'));
  });
  document.getElementById('fxSync').addEventListener('click', function(){
    document.body.classList.toggle('no-sync');
    this.classList.toggle('active', !document.body.classList.contains('no-sync'));
  });

  // ---------- Pixelate FX controls ----------
  // How it works: each frame, once everything is drawn at full resolution,
  // we shrink the whole picture down to a tiny offscreen canvas, then blow
  // it back up with smoothing turned off. Nearest-neighbor scaling turns
  // smooth gradients and curves into hard, blocky squares — the classic
  // low-res look. "Pixel Size" is how many real screen pixels each of
  // those blocks covers; bigger = chunkier / more 80s, lower = subtler.

  function lerp(a,b,t){ return a + (b-a)*t; }
  function lerpColor(c1,c2,t){
    return [ lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t) ];
  }
  function rgb(c, alpha=1){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${alpha})`; }

  function currentPalette(){
    if (stageMode === 'custom'){
      stageLabel.textContent = 'Custom';
      return CONFIG.customPalette;
    }
    const stages = STAGE_SETS[activeStageSet];
    const segments = stages.length - 1;
    let frac = 0;
    if (stageMode === 'auto'){
      if (inputMode === 'live'){
        const cycleSeconds = 240; // full loop length for live sets; edit freely
        const elapsed = (performance.now() - liveStartTime) / 1000;
        frac = (elapsed % cycleSeconds) / cycleSeconds;
      } else {
        const dur = audioEl.duration || 0;
        frac = dur > 0 ? Math.min(1, audioEl.currentTime / dur) : 0;
      }
    } else {
      frac = parseInt(stageMode) / segments;
    }
    const scaled = frac * segments;
    const idx = Math.min(segments-1, Math.floor(scaled));
    const t = scaled - idx;
    const s1 = stages[idx], s2 = stages[idx+1];
    stageLabel.textContent = t < 0.5 ? s1.name : s2.name;
    return {
      bg: lerpColor(s1.bg, s2.bg, t),
      a:  lerpColor(s1.a, s2.a, t),
      b:  lerpColor(s1.b, s2.b, t),
    };
  }

  // ---------- Frequency bands (one per active glyph, slow->fast) ----------
  function bandEnergies(count){
    const groups = new Array(count).fill(0);
    const n = bandCount;
    const usable = Math.floor(n * 0.85);
    for (let i=0;i<groups.length;i++){
      const startFrac = Math.pow(i/groups.length, 1.6);
      const endFrac = Math.pow((i+1)/groups.length, 1.6);
      const start = Math.floor(startFrac * usable);
      const end = Math.max(start+1, Math.floor(endFrac * usable));
      let sum = 0, count2 = 0;
      for (let j=start;j<end;j++){ sum += freqData[j]; count2++; }
      groups[i] = count2 ? (sum/count2)/255 : 0;
    }
    return groups;
  }

  // ---------- Beat detection ----------
  let bassAvg = 0, bassHistory = [];
  let beatFlash = 0;

  // ---------- Particles ----------
  const particles = [];
  function seedParticles(){
    particles.length = 0;
    const count = 90;
    for (let i=0;i<count;i++){
      particles.push({
        a: Math.random()*Math.PI*2,
        r: 60 + Math.random()*400,
        speed: (Math.random()*0.4+0.1) * (Math.random()<0.5?-1:1),
        size: 0.6 + Math.random()*2.2,
        wobble: Math.random()*Math.PI*2,
        depth: Math.random(),   // NEW: 1 = far away, shrinking toward 0 = approaching camera
      });
    }
  }
  seedParticles();

let starfieldMode = false;
document.getElementById('fxStarfield').addEventListener('click', function(){

  this.classList.toggle('active', starfieldMode);

let triangleParticles = false;

document.getElementById('fxOscilloscope').addEventListener('click', function(){

  this.classList.toggle('active', oscilloscopeOn);

  // ---------- Sigil generation ----------
  let sigilSkip = 3;
  let sigilRotation = 0;
  let glyphBandOffset = 0;

  function gcd(a, b){ return b === 0 ? a : gcd(b, a % b); }

  function buildSigilPath(cx, cy, radius){
    const points = CONFIG.sigilPoints;
    const coords = [];
    for (let i=0;i<points;i++){
      const ang = (i/points)*Math.PI*2 + sigilRotation;
      coords.push([cx + Math.cos(ang)*radius, cy + Math.sin(ang)*radius]);
    }
    const skip = (points === 4) ? (sigilSkip > 3 ? 2 : 1) : Math.max(2, Math.round(sigilSkip));
    const d = gcd(skip, points);
    const path = new Path2D();
    for (let start = 0; start < d; start++){
      let idx = start;
      path.moveTo(coords[idx][0], coords[idx][1]);
      for (let step = 0; step < points/d; step++){
        idx = (idx + skip) % points;
        path.lineTo(coords[idx][0], coords[idx][1]);
      }
    }
    return { path, coords };
  }

  function drawSigil(cx, cy, radius, energy, palette, t){
    const { path, coords } = buildSigilPath(cx, cy, radius);
    ctx.save();
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = rgb(palette.b, 0.55 + energy*0.4);
    ctx.shadowBlur = 14 + energy*22;
    ctx.shadowColor = rgb(palette.b, 0.6);
    ctx.stroke(path);

    // node dots (unchanged)
    coords.forEach(([x,y]) => {
      ctx.beginPath();
      ctx.arc(x,y, 2.2 + energy*3, 0, Math.PI*2);
      ctx.fillStyle = rgb(palette.a, 0.8);
      ctx.fill();
    });
    ctx.restore();
  }

  function drawOscilloscope(cx, cy, radius, palette){
      const { path: clipPath } = buildSigilPath(cx, cy, radius);
      analyser.getByteTimeDomainData(timeData);

      ctx.save();
      ctx.clip(clipPath);   // <- everything below this line is confined inside the sigil's own outline
      ctx.fillStyle = rgb(palette.bg, 1);   // fully opaque — wipes lingering trail, but only inside the clip
      ctx.fillRect(cx-radius, cy-radius, radius*2, radius*2);

      const points = 24;               // fewer points = a naturally smoother curve
      const spread = 3;                // average this many raw samples per point, same trick as your spectrum ring
      ctx.beginPath();
      let prevX, prevY;
      for (let i=0; i<=points; i++){
        const idx = Math.floor((i/points) * (timeData.length - 1));
        let sum = 0, count = 0;
        for (let j = Math.max(0, idx-spread); j <= Math.min(timeData.length-1, idx+spread); j++){
          sum += timeData[j];
          count++;
        }
        const sample = (sum/count - 128) / 128;
        const x = cx - radius + (i/points) * radius * 2;
        const y = cy + sample * radius * 0.7 * sensitivity;

        if (i === 0){
          ctx.moveTo(x, y);
          prevX = x; prevY = y;
        } else {
          const midX = (prevX + x) / 2;
          const midY = (prevY + y) / 2;
          ctx.quadraticCurveTo(prevX, prevY, midX, midY);  // curves through the midpoint, using the raw point as its "pull"
          prevX = x; prevY = y;
        }
      }
      ctx.lineTo(prevX, prevY);   // closes out the final short segment
      ctx.lineWidth = 2.5;              // bolder, cleaner-reading stroke
      ctx.strokeStyle = rgb(palette.b, 0.5);
      ctx.shadowBlur = 12;
      ctx.shadowColor = rgb(palette.b, 0.5);
      ctx.stroke();
      ctx.restore();
    }

  // ---------- Sacred geometry rings ----------
  function drawGeometryRing(cx, cy, baseR, energy, palette, layers, rot){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    for (let l=0; l<layers; l++){
      const r = baseR + l*26 + energy*40;
      const petals = CONFIG.sigilPoints;
      ctx.beginPath();
      for (let i=0;i<petals;i++){
        const ang = (i/petals)*Math.PI*2;
        const px = Math.cos(ang)*r, py = Math.sin(ang)*r;
        ctx.moveTo(px + r*0.58, py);
        ctx.arc(px,py, r*0.58, 0, Math.PI*2);
      }
      ctx.lineWidth = 0.8;
      ctx.strokeStyle = rgb(palette.a, 0.10 + energy*0.10);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPlanetRing(cx, cy, radius, energies, palette, rot){
    const glyphs = CONFIG.activeGlyphs;
    const offsetWhole = Math.floor(glyphBandOffset);
    const offsetFrac = glyphBandOffset - offsetWhole;   // 0 → 1, resets every time offsetWhole ticks up
    ctx.save();
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i=0;i<glyphs.length;i++){
      const ang = (i/glyphs.length)*Math.PI*2 + rot;
      const bandIdxA = (i + offsetWhole) % glyphs.length;
      const bandIdxB = (i + offsetWhole + 1) % glyphs.length;
      const e = (energies[bandIdxA]*(1 - offsetFrac) + energies[bandIdxB]*offsetFrac) * sensitivity;
      const r = radius + e*30;
      const x = cx + Math.cos(ang)*r;
      const y = cy + Math.sin(ang)*r;
      ctx.save();
      ctx.translate(x,y);
      const scale = 0.8 + e*0.9;
      ctx.scale(scale, scale);
      ctx.shadowBlur = 10 + e*30;
      ctx.shadowColor = rgb(palette.b, 0.9);
      ctx.fillStyle = rgb(palette.b, 0.55 + e*0.45);
      ctx.fillText(glyphs[i], 0, 0);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawSpectrumRing(cx, cy, radius, palette){
    const bars = 96;
    const half = bars / 2;
    ctx.save();
    for (let i=0;i<bars;i++){
      const fold = i <= half ? i : bars - i;             // 0 → 48 → 0, a triangle wave
      const idx = Math.floor((fold/half) * bandCount * 0.7);
      const v = (freqData[idx]/255) * sensitivity;
      const ang = (i/bars)*Math.PI*2-(Math.PI/2); // SpectrumRing rotation
      const len = 6 + v*46;
      const x1 = cx + Math.cos(ang)*radius;
      const y1 = cy + Math.sin(ang)*radius;
      const x2 = cx + Math.cos(ang)*(radius+len);
      const y2 = cy + Math.sin(ang)*(radius+len);
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = rgb(palette.a, 0.15 + v*0.55);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticles(cx, cy, overall, palette){
    particles.forEach(p => {
      if (starfieldMode){
        p.depth -= (0.001 + overall*0.01);          // approach speed, reacts to audio energy
        if (p.depth <= 0.02){
          p.depth = 1;                               // "passed the camera" — respawn far away
          p.a = Math.random()*Math.PI*2;              // new random direction, avoids repeating streaks
        }
        const scale = 1 / p.depth;
        const x = cx + Math.cos(p.a) * scale * 40;
        const y = cy + Math.sin(p.a) * scale * 40;
        const size = p.size * scale * 0.2  * particleSizeMultiplier;
        const alpha = Math.min(1, (1-p.depth)*1.4) * (0.2+overall*0.5);
        drawParticleShape(x, y, size, rgb(palette.b, alpha));
      } else {
        // unchanged — existing orbital code
        p.a += p.speed * 0.004 * (0.4 + overall*1.6);
        p.wobble += 0.01;
        const wob = Math.sin(p.wobble) * 8;
        const x = cx + Math.cos(p.a) * (p.r + wob);
        const y = cy + Math.sin(p.a) * (p.r*0.75 + wob);
        const size = p.size * (0.6 + overall*1.8) * particleSizeMultiplier;
        drawParticleShape(x, y, size, rgb(palette.b, 0.15 + overall*0.35));
      }
    });
  }

  function drawParticleShape(x, y, size, fillStyle){
    ctx.beginPath();
    if (triangleParticles){
      for (let k=0; k<3; k++){
        const ang = (k/3)*Math.PI*2 - Math.PI/2;   // start pointing straight up
        const px = x + Math.cos(ang)*size;
        const py = y + Math.sin(ang)*size;
        if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else {
      ctx.arc(x, y, size, 0, Math.PI*2);
    }
    ctx.fillStyle = fillStyle;
    ctx.fill();
  }

  // ---------- Main render loop ----------
  function formatTime(s){
    if (!isFinite(s)) return '00:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function loop(){
    requestAnimationFrame(loop);
    const w = window.innerWidth, h = window.innerHeight;
    const cx = w/2, cy = h/2;

    const palette = currentPalette();

    // trailing fade instead of hard clear
    ctx.fillStyle = rgb(palette.bg, 0.16);
    ctx.fillRect(0,0,w,h);

    if (!analyser){
      timeLabel.textContent = '00:00 / 00:00';
      return;
    }

    analyser.getByteFrequencyData(freqData);
    const glyphCount = CONFIG.activeGlyphs.length;
    const energies = bandEnergies(glyphCount);
    const overall = energies.reduce((a,b)=>a+b,0)/energies.length * sensitivity;
    const bass = (energies[0] + (energies[1]??energies[0])) / 2;
    const trebleIdx1 = Math.max(0, glyphCount-2), trebleIdx2 = glyphCount-1;
    const treble = (energies[trebleIdx1] + energies[trebleIdx2]) / 2;

    // beat detect
    bassHistory.push(bass);
    if (bassHistory.length > 40) bassHistory.shift();
    bassAvg = bassHistory.reduce((a,b)=>a+b,0)/bassHistory.length;
    if (bass > bassAvg*1.35 + 0.05 && bass > 0.15){
      beatFlash = 1;
    }
    beatFlash *= 0.90;

    sigilRotation += 0.0015 + treble*0.01;
    sigilSkip = 2 + Math.floor(treble * 6);
    glyphBandOffset += 0.003; // tune this — bigger number = faster hand-off between glyphs

    const minDim = Math.min(w,h);

    drawParticles(cx, cy, overall, palette);
    drawGeometryRing(cx, cy, minDim*0.10, bass, palette, 3, sigilRotation*0.3);
    drawSpectrumRing(cx, cy, minDim*0.30, palette);
    drawPlanetRing(cx, cy, minDim*0.22, energies, palette, -sigilRotation*0.6);
    if (oscilloscopeOn) drawOscilloscope(cx, cy, minDim*0.13, palette);
    drawSigil(cx, cy, minDim*0.13, overall, palette, sigilRotation);

    if (beatFlash > 0.03){
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, minDim*0.13 + beatFlash*60, 0, Math.PI*2);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = rgb(palette.b, beatFlash*0.6);
      ctx.stroke();
      ctx.restore();
    }

    if (inputMode === 'live' && micStream){
      const elapsed = (performance.now() - liveStartTime) / 1000;
      timeLabel.textContent = `LIVE ${formatTime(elapsed)}`;
    } else {
      timeLabel.textContent = `${formatTime(audioEl.currentTime)} / ${formatTime(audioEl.duration)}`;
    }

    // ---- Pixelate post-process: shrink then blow back up, no smoothing ----
    if (pixelateOn){
      ctx.save();
      ctx.setTransform(1,0,0,1,0,0); // work in raw device pixels for this blit
      pixelCtx.clearRect(0,0,pixelCanvas.width, pixelCanvas.height);
      pixelCtx.drawImage(canvas, 0,0, canvas.width, canvas.height, 0,0, pixelCanvas.width, pixelCanvas.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(pixelCanvas, 0,0, pixelCanvas.width, pixelCanvas.height, 0,0, canvas.width, canvas.height);
      ctx.restore(); // back to the dpr transform for next frame's normal drawing
    }
  }
  loop();

  // ---------- Recording ----------
  let recorder, chunks = [];
  let recording = false;

  recBtn.addEventListener('click', () => {
    if (!recording){
      const canvasStream = canvas.captureStream(30);
      const combined = new MediaStream([
        ...canvasStream.getVideoTracks(),
        ...recDest.stream.getAudioTracks(),
      ]);

      // Try H.264-in-MP4 first — this is what Resolve actually wants.
      // Only fall back to WebM if the browser genuinely can't produce MP4.
      let mime = 'video/mp4;codecs=avc1,mp4a.40.2';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/mp4';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp9,opus';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8,opus';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

      recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
      chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const actualMime = recorder.mimeType || mime;        // what was ACTUALLY recorded
        const ext = actualMime.includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob(chunks, { type: actualMime });  // matches reality now, not a guess
        const url = URL.createObjectURL(blob);
        dl.href = url;
        dl.download = `great-work-seal-${Date.now()}.${ext}`;
        dl.click();
      };
      recorder.start();
      recording = true;
      recBtn.textContent = 'Stop Recording';
      recBtn.classList.add('on');
      if (inputMode === 'file' && !playing) playBtn.click();
    } else {
      recorder.stop();
      recording = false;
      recBtn.textContent = 'Begin Recording';
      recBtn.classList.remove('on');
    }
  });

})();
</script>
</body>
</html>
