<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0906;
    --ink:#050403;
    --accent:#dcdcdc;
    --parchment:#e8e2d0;
    --line: rgba(220, 220, 220, 0.35);
  }
  body {
    background:var(--ink); color:var(--parchment);
    font-family:"Pirata One", serif;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; margin:0;
  }
  h1 {
    font-family:"Pirata One", serif; font-weight:400;
    font-size:clamp(32px,5vw,52px); margin:0 0 20px;
    color:var(--accent); letter-spacing:0.08em;
    text-shadow:0 0 24px rgba(220, 220, 220, 0.5), 0 0 2px rgba(220, 220, 220, 0.8);
  }
  a {
    color:var(--parchment); font-size:1.4rem; margin:1rem;
    text-decoration:none; border:1px solid var(--line);
    padding:0.6rem 1.4rem; border-radius:2px;
    transition:all .25s ease;
  }
  a:hover {
    background:rgba(220,220,220,0.12); border-color:var(--accent);
    color:var(--accent);
  }
</style>
</head>
<body>
  <h1>Projects</h1>
  <a href="visualizer.html">Great Work Visualizer</a>
  <a href="tuner.html">Tuner</a>
</body>
</html>
