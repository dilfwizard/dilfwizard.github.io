<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pirata+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0906;
    --ink:#232323;
    --accent:#dcdcdc;
    --parchment:#e8e2d0;
    --line: rgba(220, 220, 220, 0.35);
  }
  body {
    background:var(--ink); color:var(--parchment);
    font-family:"Pirata One", serif;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; margin:0;
  }
  h1 {
    font-family:"Pirata One", serif; font-weight:400;
    font-size:clamp(32px,5vw,52px); margin:0 0 20px;
    color:var(--accent); letter-spacing:0.08em;
    animation: titlePulse 3.5s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% {
      text-shadow: 0 0 16px rgba(220, 220, 220, 0.35), 0 0 2px rgba(220, 220, 220, 0.7);
    }
    50% {
      text-shadow: 0 0 30px rgba(220, 220, 220, 0.65), 0 0 3px rgba(220, 220, 220, 0.9);
    }
  }
  a {
    font-family:"VT323"; color:var(--parchment); font-size:1.4rem; margin:1rem;
    text-decoration:none; border:1px solid var(--line);
    padding:0.6rem 1.4rem; border-radius:2px;
    transition:all .25s ease;
  }
  a:hover {
    background:rgba(220,220,220,0.12); border-color:var(--accent);
    color:var(--accent);
  }
</style>
</head>
<body>
  <h1>Projects</h1>
  <a href="visualizer.html">Great Work Visualizer</a>
  <a href="tuner.html">Alchemy Tuner</a>
</body>
</html>
